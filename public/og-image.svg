<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="140" fill="white" opacity="0.05" />
  <circle cx="80" cy="560" r="100" fill="white" opacity="0.05" />
  <circle cx="950" cy="520" r="60" fill="white" opacity="0.07" />

  <!-- Card -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1.5" />

  <!-- Emoji row -->
  <text x="600" y="200" text-anchor="middle" font-size="80" font-family="serif">✨ 💡 🎯 🚀 💬</text>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="-1">Right Emoji</text>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="32" fill="white" opacity="0.85">AI-powered emoji suggestions for your phrases</text>

  <!-- Tag line -->
  <rect x="440" y="430" width="320" height="56" rx="28" fill="white" opacity="0.15" />
  <text x="600" y="465" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22" fill="white" opacity="0.95">Find the perfect emoji instantly</text>
</svg>
